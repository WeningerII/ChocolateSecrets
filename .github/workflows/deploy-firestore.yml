name: deploy-firestore

# Auto-deploys Firestore SECURITY RULES + COMPOSITE INDEXES to production
# (project absolute-pulsar-301421, the named ai-studio-… database — both read
# from firebase.json) whenever they change on main. Also runnable by hand from
# the Actions tab ("Run workflow").
#
# Prerequisite (one-time): repo secret FIREBASE_SERVICE_ACCOUNT — the same
# secret firebase-hosting.yml uses. Firebase console -> Project settings ->
# Service accounts -> Generate new private key; paste the JSON into repo
# Settings -> Secrets and variables -> Actions.
#
# Safety: the Firestore emulator rules-test suite (159 tests) must pass in this
# run before anything deploys — rules that fail their tests can never ship.
# `--force` makes the committed firestore.indexes.json the source of truth
# (indexes removed from the file are deleted in production; ours is curated to
# exactly match the queries in code).

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-firestore.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-firestore
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy credential exists
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::The FIREBASE_SERVICE_ACCOUNT repo secret is not set. Firebase console -> Project settings -> Service accounts -> Generate new private key, then add the JSON as a repo Actions secret named FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Gate — Firestore rules tests (emulator)
        run: firebase emulators:exec --only firestore --project demo-chocolate-secrets "npm run test:rules"

      - name: Write service-account credential
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Deploy rules + indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: firebase deploy --only firestore --project absolute-pulsar-301421 --force --non-interactive

      - name: Scrub credential
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
