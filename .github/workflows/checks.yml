name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      # The root `tsc` type-checks functions/src too, and the functions tests run
      # under the root vitest pass, so the functions package deps must be present.
      - name: Install functions deps
        run: npm --prefix functions ci

      - name: TypeScript build check
        run: npm run lint

      - name: Schema drift check
        run: npm run check:schema

      - name: Locale parity check
        run: npm run check:locale-parity

      - name: Hardcoded-string sweep
        run: npm run check:hardcoded-strings

      - name: Unit tests
        run: npm test

      - name: Functions tests
        run: npm run test:functions

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firestore rules tests
        run: firebase emulators:exec --only firestore --project demo-chocolate-secrets "npm run test:rules"
